services:
  postgres-auth:
    image: postgres:18.3
    container_name: postgres-auth
    environment:
      POSTGRES_USER: auth-user
      POSTGRES_PASSWORD: auth-password
      POSTGRES_DB: auth-db
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth-user -d auth-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - post-service-network

  postgres-post:
    image: postgres:18.3
    container_name: postgres-post
    environment:
      POSTGRES_USER: post-user
      POSTGRES_PASSWORD: post-password
      POSTGRES_DB: post-db
    ports:
      - "5434:5432"
    volumes:
      - postgres_post_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U post-user -d post-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - post-service-network

  postgres-notification:
    image: postgres:18.3
    container_name: postgres-notification
    environment:
      POSTGRES_USER: notification-user
      POSTGRES_PASSWORD: notification-password
      POSTGRES_DB: notification-db
    ports:
      - "5435:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification-user -d notification-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - post-service-network

  redis:
    image: redis:8.6.3
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - post-service-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.8
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo ruok > /dev/tcp/localhost/2181 && echo imok' | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - post-service-network

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - post-service-network

  migrate-auth:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: migrator/cmd
    env_file:
      - ../configs/auth.env
    environment:
      MIGRATIONS_DIR: /app/migrations/auth
    container_name: migrate-auth
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - post-service-network

  migrate-post:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: migrator/cmd
    env_file:
      - ../configs/post.env
    environment:
      MIGRATIONS_DIR: /app/migrations/post
    container_name: migrate-post
    depends_on:
      postgres-post:
        condition: service_healthy
    networks:
      - post-service-network

  migrate-notification:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: migrator/cmd
    env_file:
      - ../configs/notification.env
    environment:
      MIGRATIONS_DIR: /app/migrations/notification
    container_name: migrate-notification
    depends_on:
      postgres-notification:
        condition: service_healthy
    networks:
      - post-service-network

  auth:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: auth/cmd
    env_file:
      - ../configs/auth.env
    container_name: auth
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: unless-stopped
    networks:
      - post-service-network

  outbox:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: outbox/cmd
    env_file:
      - ../configs/outbox.env
    container_name: outbox
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - post-service-network

  notification:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: notification/cmd
    env_file:
      - ../configs/notification.env
    container_name: notification
    depends_on:
      migrate-notification:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - post-service-network

  post:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: post/cmd
    env_file:
      - ../configs/post.env
    container_name: post
    depends_on:
      migrate-post:
        condition: service_completed_successfully
      auth:
        condition: service_started
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - post-service-network

volumes:
  postgres_auth_data:
  postgres_post_data:
  postgres_notification_data:
  redis_data:

networks:
  post-service-network:
    driver: bridge