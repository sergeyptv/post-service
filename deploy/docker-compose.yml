services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-post:
    image: postgres:16-alpine
    container_name: postgres-post
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: post
    ports:
      - "5434:5432"
    volumes:
      - postgres_post_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d post"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth
    container_name: auth
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: docker
      AUTH_HTTP_ADDR: :8081
      AUTH_GRPC_ADDR: :50051
      AUTH_DB_DSN: postgres://postgres:postgres@postgres-auth:5432/auth?sslmode=disable
      AUTH_REDIS_ADDR: redis:6379
    ports:
      - "8081:8081"
      - "50051:50051"
    restart: unless-stopped

  outbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: outbox
    container_name: outbox
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      APP_ENV: docker
      OUTBOX_DB_DSN: postgres://postgres:postgres@postgres-auth:5432/auth?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: notifications
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: notification
    container_name: notification
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      APP_ENV: docker
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: notifications
    restart: unless-stopped

  post:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: post
    container_name: post
    depends_on:
      postgres-post:
        condition: service_healthy
      auth:
        condition: service_started
    environment:
      APP_ENV: docker
      POST_HTTP_ADDR: :8082
      POST_DB_DSN: postgres://postgres:postgres@postgres-post:5432/post?sslmode=disable
      AUTH_GRPC_ADDR: auth:50051
    ports:
      - "8082:8082"
    restart: unless-stopped

volumes:
  postgres_auth_data:
  postgres_post_data:
  redis_data: